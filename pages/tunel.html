<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Flashback • 50 anos Máira • Convite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="animated-bg"></div>
    <div class="grid-overlay"></div>

    <div class="main-content1">
        <!-- SEÇÃO 2 TÚNEL DO TEMPO -->
        <section class="section" id="tunel">
            <h2 class="neon-title" style="font-family:'Orbitron';"><i class="fas fa-repeat"></i> TÚNEL DO TEMPO</h2>
            <div class="tunnel">
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👶🍼</span></div><span class="photo-caption-outside">Bebê</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">🧒🎈</span></div><span class="photo-caption-outside">Criança</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👧🏽🌸</span></div><span class="photo-caption-outside">15 anos</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👩🏼🎓</span></div><span class="photo-caption-outside">19 anos</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👰‍♀️💍</span></div><span class="photo-caption-outside">Casada</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👩‍👧‍👧</span></div><span class="photo-caption-outside">Filhas</span>
                </div>
                <div class="photo-item">
                    <div class="photo-frame"
                        onclick="this.classList.add('click-animate');setTimeout(()=>this.classList.remove('click-animate'),400);">
                        <span class="photo-emoji">👨‍👩‍👧‍👦</span></div><span
                        class="photo-caption-outside">Família</span>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <div class="footer"><i class="fas fa-sync-alt fa-spin"></i> FLASHBACK • 50 ANOS DA MÁIRA • 2026 <i
                class="fas fa-sync-alt fa-spin"></i></div>
    </footer>

    <script src="../js/script.js"></script>
</body>

</html>
