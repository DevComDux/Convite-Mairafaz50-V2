<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Flashback • 50 anos Máira • Convite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="animated-bg"></div>
    <div class="grid-overlay"></div>
    <div class="vhs-overlay"></div>

    <div class="main-content1">
        <!-- SEÇÃO 7 CONFIRMAÇÃO (sem botão cardápio) -->
        <section class="section" id="confirmacao">
            <div class="retro-card">
                <div class="secao7-conteudo">
                    <h2 class="neon-title" style="font-size:clamp(1.8rem,6vw,2.8rem);"><i class="fa-regular fa-circle-check"></i> CONFIRMAÇÃO</h2>
                    <div class="data-limite">Até</div>
                    <div class="data-destaque-suave">05/04/2026</div>
                    <div class="countdown-box">
                        <div class="countdown-label">Tempo restante</div>
                        <div class="countdown-timer" id="confirmCountdown">--d --h --m --s</div>
                    </div>
                    <div class="btn-group"><a href="https://docs.google.com/forms/d/e/1FAIpQLSdx73LquR8aCyd6y1rDEUI12pgC2fQuz9EYkdoiP3B7BdYzOw/viewform?usp=header" class="neon-btn" target="_blank"><i class="fas fa-check-circle"></i> Confirmar presença</a></div>
                    <div class="vagas-limitadas"><i class="fas fa-exclamation-triangle"></i> VAGAS LIMITADAS <i
                            class="fas fa-exclamation-triangle"></i></div>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <div class="footer"><i class="fas fa-sync-alt fa-spin"></i> FLASHBACK • 50 ANOS DA MÁIRA • 2026 <i
                class="fas fa-sync-alt fa-spin"></i></div>
    </footer>

    <script src="../js/script.js"></script>
</body>

</html>
